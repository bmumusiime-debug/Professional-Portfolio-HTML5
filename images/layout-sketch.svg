<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Semantic Layout Sketch</title>
  <desc id="desc">A basic wireframe showing header, nav, main, aside, section, article, and footer.</desc>
  <rect width="640" height="420" fill="#fff8e7"/>
  <rect x="40" y="30" width="560" height="55" fill="#7dbbc3" stroke="#264653" stroke-width="2"/>
  <rect x="40" y="95" width="560" height="45" fill="#f4a261" stroke="#264653" stroke-width="2"/>
  <rect x="40" y="150" width="370" height="180" fill="#fefae0" stroke="#264653" stroke-width="2"/>
  <rect x="425" y="150" width="175" height="180" fill="#e9edc9" stroke="#264653" stroke-width="2"/>
  <rect x="55" y="165" width="340" height="72" fill="#ffffff" stroke="#264653" stroke-width="1.5"/>
  <rect x="55" y="248" width="340" height="67" fill="#ffffff" stroke="#264653" stroke-width="1.5"/>
  <rect x="40" y="345" width="560" height="45" fill="#d4a373" stroke="#264653" stroke-width="2"/>
  <text x="285" y="63" font-family="Georgia, serif" font-size="21" fill="#1d3557">header</text>
  <text x="295" y="123" font-family="Georgia, serif" font-size="20" fill="#1d3557">nav</text>
  <text x="205" y="245" font-family="Georgia, serif" font-size="20" fill="#1d3557">main</text>
  <text x="483" y="245" font-family="Georgia, serif" font-size="20" fill="#1d3557">aside</text>
  <text x="192" y="209" font-family="Georgia, serif" font-size="18" fill="#1d3557">article</text>
  <text x="188" y="287" font-family="Georgia, serif" font-size="18" fill="#1d3557">section</text>
  <text x="285" y="374" font-family="Georgia, serif" font-size="21" fill="#1d3557">footer</text>
</svg>
